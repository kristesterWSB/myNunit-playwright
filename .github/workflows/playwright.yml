name: Playwright E2E Tests


on:
  push:
    branches: [ main, master ]

jobs:
  e2e-tests:
    timeout-minutes: 60 
    runs-on: ubuntu-latest 

    env:
      HEADED: 0
      PWDEBUG: 0

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0' 

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Install Playwright Browsers and OS Dependencies
      run: pwsh bin/Debug/net9.0/playwright.ps1 install --with-deps

    - name: Run Playwright tests
      run: dotnet test --no-build --verbosity normal --settings playwright.runsettings

    - name: Upload Traces and Test Results
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: playwright-traces
        path: |
          **/bin/Debug/**/playwright-traces/
          **/TestResults/
        retention-days: 7