name: Playwright E2E Tests with Allure Report

on:
  push:
    branches: [main, master]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------
  # JOB 1: Triggering tests in Docker Container
  # -------------------------------------------------------------
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/dotnet:v1.59.0-jammy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --no-restore

      - name: Run Playwright tests
        run: dotnet test --no-build --verbosity normal
        continue-on-error: true

      - name: Archive Allure Raw Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: "**/bin/Debug/**/allure-results/"
          retention-days: 1

      - name: Upload Traces and Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            **/bin/Debug/**/playwright-traces/
            **/TestResults/
          retention-days: 7

  # -------------------------------------------------------------
  # JOB 2: Generate HTML report and publish to GitHub Pages
  # -------------------------------------------------------------

  generate-report:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure Raw Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Setup Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Load Allure History & Generate Report
        uses: simple-elf/allure-report-action@master
        id: allure-report
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
